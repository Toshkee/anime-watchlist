name: E2E

on:
  push:
    branches: [main, rebuild/nextjs]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright happy path
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: senpai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/senpai_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/senpai_test?schema=public
      AUTH_SECRET: ci-e2e-secret-not-for-production
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci # postinstall runs `prisma generate`

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
